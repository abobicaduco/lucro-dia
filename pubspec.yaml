name: lucro_dia
description: Registre vendas e compras do dia a dia e veja se está lucrando — dados só no seu celular.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path: ^1.9.1
  intl: ^0.20.2
  package_info_plus: ^8.3.0
  http: ^1.4.0
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.5
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
