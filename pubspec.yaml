name: lucro_dia
description: Registre vendas e compras do dia a dia e veja se está lucrando — dados só no seu celular.
publish_to: 'none'
version: 1.0.2+3

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path: ^1.9.1
  intl: ^0.20.2
  package_info_plus: ^8.3.0
  http: ^1.4.0
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  qr_flutter: ^4.1.0
  device_info_plus: ^11.5.0
  google_mobile_ads: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.5
  flutter_launcher_icons: ^0.14.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/ic_full.png"
  adaptive_icon_background: "#1B7F5C"
  adaptive_icon_foreground: "assets/icon/ic_foreground.png"
  min_sdk_android: 24
